<div class="bg-red-500 text-white p-4">
  TEST TAILWIND
</div>
<div class="min-h-screen bg-gray-50 flex items-center justify-center px-4">
  <div class="w-full max-w-md">

    <!-- Logo / Brand -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-12 h-12 bg-indigo-600 rounded-xl mb-4">
        <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17
               m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/>
        </svg>
      </div>
      <h1 class="text-2xl font-semibold text-gray-900">TSM</h1>
      <p class="text-sm text-gray-500 mt-1">Trade Management System</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
      <h2 class="text-lg font-semibold text-gray-900 mb-6">Iniciar sesión</h2>

      <!-- Error -->
      @if (error()) {
        <div class="mb-4 px-4 py-3 bg-red-50 border border-red-100 rounded-lg text-sm text-red-600">
          {{ error() }}
        </div>
      }

      <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4">

        <!-- Email -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
          <input
            formControlName="email"
            type="email"
            placeholder="tu@email.com"
            class="w-full px-3 py-2.5 text-sm border rounded-lg outline-none transition-all
                   border-gray-200 bg-gray-50 focus:bg-white focus:border-indigo-400 focus:ring-2
                   focus:ring-indigo-100 placeholder:text-gray-400"
            [class.border-red-300]="email.invalid && email.touched"
          />
          @if (email.invalid && email.touched) {
            <p class="mt-1 text-xs text-red-500">Ingresá un email válido</p>
          }
        </div>

        <!-- Password -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
          <input
            formControlName="password"
            type="password"
            placeholder="••••••••"
            class="w-full px-3 py-2.5 text-sm border rounded-lg outline-none transition-all
                   border-gray-200 bg-gray-50 focus:bg-white focus:border-indigo-400 focus:ring-2
                   focus:ring-indigo-100 placeholder:text-gray-400"
            [class.border-red-300]="password.invalid && password.touched"
          />
          @if (password.invalid && password.touched) {
            <p class="mt-1 text-xs text-red-500">La contraseña es obligatoria</p>
          }
        </div>

        <!-- Submit -->
        <button
          type="submit"
          [disabled]="loading()"
          class="w-full py-2.5 px-4 bg-indigo-600 hover:bg-indigo-700 disabled:bg-indigo-400
                 text-white text-sm font-medium rounded-lg transition-colors mt-2 cursor-pointer">
          @if (loading()) {
            <span class="inline-flex items-center gap-2">
              <svg class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
              </svg>
              Ingresando...
            </span>
          } @else {
            Ingresar
          }
        </button>
      </form>

      <p class="text-sm text-gray-500 text-center mt-6">
        ¿No tenés cuenta?
        <a routerLink="/auth/register" class="text-indigo-600 hover:text-indigo-700 font-medium">
          Registrate
        </a>
      </p>
    </div>
  </div>
</div>
