<div class="max-w-lg">
  <div class="flex items-center gap-3 mb-6">
    <a routerLink="/commerces" class="text-white/30 hover:text-white/60 transition-colors">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
      </svg>
    </a>
    <h1 class="text-xl font-semibold text-white/90">Nuevo Comercio</h1>
  </div>

  @if (error()) {
    <div class="mb-4 px-4 py-3 rounded-lg bg-red-500/10 border border-red-500/20 text-sm text-red-400">
      {{ error() }}
    </div>
  }

  <div class="rounded-xl border border-white/5 p-6" style="background:#1a1a1a;">
    <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-5">

      <div>
        <label class="block text-xs text-white/40 uppercase tracking-wider mb-2">Nombre *</label>
        <input formControlName="name" type="text" placeholder="Mi Comercio"
               class="w-full px-3 py-2.5 rounded-lg bg-white/5 border border-white/10 text-white/90
                      text-sm placeholder:text-white/20 focus:outline-none focus:border-indigo-500/50
                      focus:bg-white/8 transition-all"
               [class.border-red-500]="form.get('name')!.invalid && form.get('name')!.touched"/>
      </div>

      <div>
        <label class="block text-xs text-white/40 uppercase tracking-wider mb-2">Tipo *</label>
        <div class="grid grid-cols-4 gap-2">
          @for (t of types; track t.value) {
            <label class="cursor-pointer">
              <input type="radio" formControlName="type" [value]="t.value" class="sr-only"/>
              <div class="rounded-lg p-2.5 text-center transition-all border"
                   [class.border-indigo-500]="form.get('type')!.value === t.value"
                   [class.bg-indigo-500]="form.get('type')!.value === t.value"
                   [class.bg-opacity-15]="form.get('type')!.value === t.value"
                   [class.border-white]="form.get('type')!.value !== t.value"
                   [class.border-opacity-5]="form.get('type')!.value !== t.value">
                <div class="text-xl mb-1">{{ t.emoji }}</div>
                <p class="text-[10px] text-white/50">{{ t.label }}</p>
              </div>
            </label>
          }
        </div>
      </div>

      <div>
        <label class="block text-xs text-white/40 uppercase tracking-wider mb-2">Descripción</label>
        <textarea formControlName="description" rows="2" placeholder="Descripción opcional..."
                  class="w-full px-3 py-2.5 rounded-lg bg-white/5 border border-white/10 text-white/90
                         text-sm placeholder:text-white/20 focus:outline-none focus:border-indigo-500/50
                         resize-none transition-all">
        </textarea>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-xs text-white/40 uppercase tracking-wider mb-2">Dirección</label>
          <input formControlName="address" type="text" placeholder="Av. Corrientes 123"
                 class="w-full px-3 py-2.5 rounded-lg bg-white/5 border border-white/10 text-white/90
                        text-sm placeholder:text-white/20 focus:outline-none focus:border-indigo-500/50 transition-all"/>
        </div>
        <div>
          <label class="block text-xs text-white/40 uppercase tracking-wider mb-2">Teléfono</label>
          <input formControlName="phone" type="text" placeholder="11 1234-5678"
                 class="w-full px-3 py-2.5 rounded-lg bg-white/5 border border-white/10 text-white/90
                        text-sm placeholder:text-white/20 focus:outline-none focus:border-indigo-500/50 transition-all"/>
        </div>
      </div>

      <button type="submit" [disabled]="loading()"
              class="w-full py-2.5 rounded-lg bg-indigo-500 text-white text-sm font-medium
                     hover:bg-indigo-600 disabled:opacity-50 transition-colors mt-2">
        @if (loading()) { Creando... } @else { Crear Comercio }
      </button>
    </form>
  </div>
</div>
